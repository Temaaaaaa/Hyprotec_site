name: Telegram News Sync

on:
  schedule:
    - cron: '0 * * * *' # Запуск каждый час
  workflow_dispatch: # Ручной запуск
    inputs:
      force_reset:
        description: 'Сбросить state и пересобрать ленту с чистого листа'
        required: false
        default: false
        type: boolean

concurrency:
  group: telegram-news-sync
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure ffmpeg
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

      - name: Run Fetch Script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          FORCE_RESET: ${{ github.event.inputs.force_reset || 'false' }}
          MAX_NEWS_ITEMS: '10'
          MAX_NEWS_AGE_DAYS: '0'
          OPTIMIZE_VIDEOS: 'true'
          OPTIMIZE_MIN_BYTES: '4000000'
          MAX_VIDEO_WIDTH: '1280'
          VIDEO_CRF: '29'
          VIDEO_PRESET: 'veryfast'
        run: node get_news.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/news.json
          [ -f data/tg_state.json ] && git add data/tg_state.json || true
          [ -d images/news ] && git add images/news/ || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: auto-update news and images from Telegram"

          BRANCH="${GITHUB_REF_NAME:-main}"
          git pull --rebase origin "$BRANCH"
          git push origin "HEAD:$BRANCH"
